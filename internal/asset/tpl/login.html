<style>
    .form-container {
        margin-top: 35vh;
        transform: translateY(-50%);
    }
    .my-card{
        background-image: linear-gradient(
                to bottom right,
                #dbe4ff,
                #bfdbfe
        );
    }
</style>
<div class="min-vh-100">
    <div class="row justify-content-center">
        <div class="col-md-4 col-8 form-container text-center card p-5 my-card">
            <form method="post" action="/login" target="ifr_form">
                <fieldset>
                    <legend>Admin Login</legend>
                    <div class="login-form">
                        <div class="form-group">
                            <input type="text" name="name" placeholder="Enter your name" value="" class="form-control" required>
                        </div>
                        <div class="form-group mt-2">
                            <input type="password"  name="psw" placeholder="Password" value="" class="form-control">
                        </div>
                        <div class="mt-3 d-flex justify-content-center gap-5">
                            <input type="submit" value="Login" class="btn btn-primary">
                            <input type="reset" value="Reset" class="btn btn-primary">
                        </div>
                    </div>
                </fieldset>
            </form>
        </div>
    </div>
</div>

<iframe name="ifr_form" style="display:none;"></iframe>
